Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/nwdaf.local/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"

  - &NWDAFOrg
    Name: NWDAFMSP
    ID: NWDAFMSP
    MSPDir: crypto-config/peerOrganizations/nwdaf.local/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('NWDAFMSP.admin', 'NWDAFMSP.peer', 'NWDAFMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('NWDAFMSP.admin', 'NWDAFMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('NWDAFMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('NWDAFMSP.peer')"
    AnchorPeers:
      - Host: peer0.nwdaf.local
        Port: 7051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.nwdaf.local:7050
  EtcdRaft:
    Consenters:
      - Host: orderer.nwdaf.local
        Port: 7050
        ClientTLSCert: crypto-config/ordererOrganizations/nwdaf.local/orderers/orderer.nwdaf.local/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/nwdaf.local/orderers/orderer.nwdaf.local/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities


# Two channel profiles — one per business domain
Profiles:
  AnalyticsChannel:
    Consortium: SampleConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *NWDAFOrg
      Capabilities:
        <<: *ApplicationCapabilities
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities

  InferenceChannel:
    Consortium: SampleConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *NWDAFOrg
      Capabilities:
        <<: *ApplicationCapabilities
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
